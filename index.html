<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="./css/style.css?v=2">
</head>
<body>
    <header class="header">
        <h1>Movie Explorer</h1>
        <div class="search-container">
            <input type="text" id="searchbox" placeholder="search movies...">
            <button id="searchbtn">🔍</button>
        </div>
        <div class="controls-wrapper">
            <select id="sortDropdown" name="sort">
                <option value="default">Sort Options...</option>
                <option value="rating">Rating (High to Low)</option>
                <option value="rating-asc">Rating (Low to High)</option>
                <option value="alphabetical">Alphabetical (A-Z)</option>
                <option value="alphabetical-desc">Alphabetical (Z-A)</option>
            </select>
            <select id="filterDropdown" name="filter">
                <option value="all">All Ratings</option>
                <option value="7">Above 7</option>
                <option value="8">Above 8</option>
            </select>
            <button id="themeToggleBtn">🌙</button>
            <button class="auth-btn login-btn">Login</button>
            <button class="auth-btn signup-btn">Sign Up</button>
        </div>
    </header>

    <div id="movieContainer">

            </div>

                <p>⭐️ rating (ratings)</p>
                <h3 class="title">1. I am The Movie</h3>
                <p>year time</p>
                <button class="wishlist-button">+ wishlist</button>
            </div>
        </div> -->

    <script src="js/script.js?v=9"></script>
</body>
</html>
